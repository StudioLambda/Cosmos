name: Test Framework

on:
  push:
    branches: ["main"]
    paths:
      - .github/workflows/framework.yml
      - contract/**
      - framework/**
  pull_request:
    branches: ["main"]
    paths:
      - .github/workflows/framework.yml
      - contract/**
      - framework/**

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./framework
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "framework/go.mod"
          cache-dependency-path: "framework/go.sum"

      - name: Link local modules
        run: go mod edit -replace github.com/studiolambda/cosmos/contract=../contract -replace github.com/studiolambda/cosmos/problem=../problem -replace github.com/studiolambda/cosmos/router=../router

      - name: Download Dependencies
        run: go mod download

      - name: Test
        run: go test -race -v ./...

  format:
    name: Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./framework
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "framework/go.mod"
          cache-dependency-path: "framework/go.sum"

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

  vet:
    name: Vet
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./framework
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "framework/go.mod"
          cache-dependency-path: "framework/go.sum"

      - name: Link local modules
        run: go mod edit -replace github.com/studiolambda/cosmos/contract=../contract -replace github.com/studiolambda/cosmos/problem=../problem -replace github.com/studiolambda/cosmos/router=../router

      - name: Download Dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

  vuln:
    name: Vulnerability Scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./framework
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "framework/go.mod"
          cache-dependency-path: "framework/go.sum"

      - name: Link local modules
        run: go mod edit -replace github.com/studiolambda/cosmos/contract=../contract -replace github.com/studiolambda/cosmos/problem=../problem -replace github.com/studiolambda/cosmos/router=../router

      - name: Download Dependencies
        run: go mod download

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Vulnerability scan
        run: govulncheck ./...
